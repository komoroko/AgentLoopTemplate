# .agentloop/state.yaml — this project's MUTABLE state. Nothing else.
#
# Task titles, dependencies, and claim mappings are NOT here: they live in plan.yaml, frozen
# at gate 3. Duplicating them is how the 0.8.x state.md and tasks.yaml drifted apart.
#
# This file is machine-written. Every change goes through one Central Store transaction
# together with the audit events that explain it, so `agentloop` is the only writer — editing
# it by hand produces a state change with no matching event, which `doctor` reports and the
# gate guard denies.
#
# A gate reaches `approved` only via a receipt binding a SIGNED attestation. There is no
# other path, no --force, and no hand-edit that survives verification.

project: "agentloop-template"
cycle_id: cycle-1                      # lowercase slug naming this delta cycle
current_phase: brief                   # brief | requirements | design | tasks | build | verify | done
updated_at: "2026-07-24"

gates:
  requirements: { status: pending, receipt: null }   # gate 1 — the human OKs the /req result
  design:       { status: pending, receipt: null }   # gate 2 — the human OKs the /design choices
  tasks:        { status: pending, receipt: null }   # gate 3 — the human OKs the plan; the plan freezes
  build:        { status: pending, receipt: null }   # gate 4 — the human OKs the grounded review
  release:      { status: pending, receipt: null }   # gate 5 — the human OKs the release

plan:
  status: draft                        # draft | frozen | invalidated

execution:
  status: idle

review:
  status: none

tasks: {}
