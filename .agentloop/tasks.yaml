# .agentloop/tasks.yaml — the "machine-readable single source of truth" for the task graph (DAG)
#
# /tasks generates this file, and /build (scripts/agentloop/build_loop.py) and /status
# (scripts/agentloop/dag.py --render) read it. fan-out, the executable frontier,
# execution layers, and the critical path are derived from blockedBy, so they are not stored here
# (storing derived values twice causes drift).
#
# The lifecycle current_phase / gates / various logs live in .agentloop/state.md
# (the per-task `phase` below is per-task phase metadata — a different thing). The task graph's truth is here.
#
# Schema:
#   id:        a unique task ID in T-NNN form
#   title:     a short human-readable description
#   kind:      foundation (a base many depend on) | parallel (independent leaves that run concurrently)
#              | integration (a join after several complete)
#   blockedBy: an array of task IDs that must be done first (DAG edges). No cycles.
#   status:    todo | in_progress | blocked | needs-revision | done
#   test:      the command/target used for the green decision (e.g. "make test" or "pytest backend/foo")
#   req:       (optional) the requirement ID it covers. R-<number> form. Multiple are comma/space-separated, e.g. "R-1" / "R-1,R-3" / "R-1 R-3".
#              Invalid forms (R1 / Req-1, etc.) are rejected by dag.py --validate. dag.py --trace mechanically cross-checks against requirements/design
#              to detect uncovered requirements and dangling references. Becomes a req:* label when mirrored to Issues.
#   phase:     (optional) the phase requirements|design|build|verify (default build; verify=filing bug fixes, etc.).
#              Becomes a phase:* label when mirrored to Issues.

tasks: []
