# yaml-language-server: $schema=schema/config.schema.json
# .agentloop/config.yaml — the execution knobs, frozen wholesale at gate 3.
#
# What may NOT go in this file matters as much as what may: no principal, no role, no
# authority, no provider executable path, no credential. Those live OUTSIDE the repository
# ($XDG_CONFIG_HOME/agentloop/trust.yaml and providers.yaml), so a pull request cannot widen
# its own permissions by editing a file it also ships.
#
# Unknown keys are rejected. In 0.8.x a typo was inert, which meant "the knob you thought you
# set" quietly wasn't set.

project:
  name: agentloop-template
  work_branch: build/agentloop-template   # `agentloop init --name X` rewrites this to build/X

execution:
  max_parallel: 3            # concurrent independent leaf tasks within the frontier
  worktree_dir: .worktrees   # already .gitignore'd
  command_timeout_sec: 1800
  agent_timeout_sec: 3600

# Which sandbox each role runs in. The bodies are below.
executors:
  implementer_profile: implementer
  reviewer_profile: reviewer
  oracle_profile: oracle
  quality_gate_profile: oracle

# ---------------------------------------------------------------------------
# SANDBOXES.
#
# A fresh repository ships `kind: host`, which is NOT policy-compliant: anything that runs
# repository-derived code, tests, or build scripts must run under an `oci` profile regardless
# of risk (a test file is code an agent wrote, and it runs with your credentials).
# `agentloop doctor` reports this as a FAIL until you fix it:
#
#     agentloop oci build --profile oracle       # builds the packaged Containerfile
#     agentloop oci build --profile reviewer
#     agentloop oci build --profile implementer  # then pins each image digest here
#
# The pinned digest — never a tag — is what stops the environment a review ran in from
# changing after that review was signed.
# ---------------------------------------------------------------------------
executor_profiles:
  oracle:
    kind: host
    containerfile: python
    # kind: oci
    # image: localhost/agentloop-python@sha256:<agentloop oci build prints this>
    # network_profile: none
    # read_only_root: true
    # no_new_privileges: true
    # mount_repo: read_only
    # writable_tmp_mb: 512
    # pids_limit: 128
    # memory_mb: 1024
    # cpu_count: 2
    # home: ephemeral

  reviewer:
    kind: host
    containerfile: reviewer
    # A reviewer container never mounts the canonical store, the Trust Manifest, or a signing
    # key: an AI that can reach the signing key does not need to convince anyone of anything.
    # env_allowlist: [MODEL_API_KEY]

  implementer:
    kind: host
    containerfile: implementer
    # mount_repo: read_write
    # mount_control_socket: true   # the ONLY way a leaf worktree may record a decision

agents:
  implementer:
    adapter: claude
  code_reviewer:
    adapter: claude
  plan_reviewer:
    adapter: claude
  # The actual extractor and the comparator must not share an independence group for a
  # critical change. With a single provider installed, use two distinct models — doctor will
  # tell you that is weaker than two providers — or satisfy the requirement with a signed
  # expert attestation instead.
  actual_extractor:
    adapter: claude
    independence_group: claude/opus
  comparator:
    adapter: claude
    independence_group: claude/sonnet
  security_reviewer:
    adapter: claude
    independence_group: claude/sonnet
  cold_maintainer:
    adapter: claude
    independence_group: claude/opus

# The single definition of the DoD. `command` is an argv array — no shell, so a pipe or a
# redirect has to live in a script a reviewer can read.
quality_gate:
  - name: test
    kind: command
    command: [make, test]
    executor_profile: oracle
    retries: 2
    required: true
  - name: check
    kind: command
    command: [make, check]
    executor_profile: oracle
    retries: 2
    required: true
  - name: review
    kind: agent
    agent_role: code_reviewer
    retries: 1
    required: true
  # A minimal real-launch check. Replace `command` as soon as any entry point launches —
  # tests stay green while the launch path is broken — then set `required: true`.
  # (Quoted: unquoted `true` in YAML is the boolean, not the /bin/true command.)
  - name: smoke
    kind: command
    command: ["true"]
    executor_profile: oracle
    retries: 1
    required: false

evidence_policy:
  rule_bundle: grounded-default-v1
  # May only ADD obligations. There is deliberately no key that removes one.
  required_obligation_overrides: []

review_policy:
  critical_requires_independent_groups: true
  cold_maintainer_for: [high, critical]
  # Exceeding a budget SPLITS THE SCOPE. It never lengthens the review screen: a reviewer
  # asked to hold 80 statements in their head is not reviewing, they are skimming.
  budgets:
    max_critical_decisions: 5
    max_critical_modules: 3
    max_human_statements: 30
    max_scenarios: 9
    max_unresolved_low_medium_unknowns: 5
    max_diff_bytes_per_partition: 524288

guard:
  # true while this repo IS the AgentLoop template (its scaffold originals share paths with
  # product deliverables). `agentloop init` writes false for products — that is when the
  # editor-hook guard goes live.
  template_mode: true
  # A path ending in "/" guards that prefix; any other path guards that exact file. Exact
  # wins over prefixes, longest prefix wins. tests/ is deliberately NOT guarded: preparing
  # fixtures while a gate is pending is sanctioned speculative work.
  paths:
    - { path: docs/20-design.md, requires_gate: requirements }
    - { path: docs/decisions/, requires_gate: requirements }
    - { path: docs/tasks/, requires_gate: design }
    - { path: docs/test/, requires_gate: build }
    - { path: src/, requires_gate: tasks }
    - { path: lib/, requires_gate: tasks }
    - { path: app/, requires_gate: tasks }
    - { path: backend/, requires_gate: tasks }
    - { path: frontend/, requires_gate: tasks }
    - { path: scripts/, requires_gate: tasks }

github:
  enabled: false        # off by default: offline-safe. The plan stays the SSOT either way.
  label: agentloop
  close_on_done: true
  repo: ""              # empty: gh infers from origin
