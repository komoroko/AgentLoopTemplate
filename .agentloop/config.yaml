# .agentloop/config.yaml — the "single source of knobs" for deterministic orchestration
#
# scripts/agentloop/build_loop.py (the implementation-loop orchestrator) and
# scripts/agentloop/gate_guard.py (the gate mechanism hook) read this file. The behavior of
# parallelism, retry, worktree, and gate enforcement is all decided here. Because code (not a
# natural-language prompt) reads it, changing this deterministically changes the execution control flow.

build:
  # How many independent leaf tasks within the frontier to launch concurrently (the worktree-isolation cap).
  max_parallel: 3

  worktree:
    enabled: true            # set false to run serially on the work branch without isolation
    dir: .worktrees          # the directory to create worktrees in (already .gitignore'd)
    branch_pattern: "{branch}/{task_id}"  # e.g. build/myproduct/T-003

  # The cap on sending a task back to implementer to retry when the quality gate fails.
  # A task that exceeds it is set to blocked, stopping the loop, and escalated to the human.
  retries:
    test_fix: 2              # number of retries when make test is red
    check_fix: 2             # number of retries when make check (lint/format/type) fails

  # The commands used for the deterministic gate decision. The orchestrator decides pass/fail by exit code.
  # If copied into a project without make, substitute these with that project's commands.
  quality_gate:
    test_cmd: "make test"
    check_cmd: "make check"

  merge:
    strategy: sequential     # merge leaf branches into work sequentially in the order they became done

gates:
  # If true, scripts/agentloop/gate_guard.py (the PreToolUse hook) mechanically blocks
  # deliverable edits while the prerequisite gate is unapproved. Set false to fall back to the convention layer (CLAUDE.md) only.
  enforce_hook: true
  # true while this repo IS the template itself: scaffold originals (docs/20-design.md, docs/tasks/**,
  # scripts/**) share paths with product deliverables, so the guard would block its own maintenance.
  # `make init` flips this to false when you turn the template into a product (guard goes live).
  template_mode: true

github:
  # One-way-mirror tasks.yaml to GitHub Issues (human-facing visibility). Read by scripts/agentloop/issue_sync.py.
  # **Off by default** = offline-safe. Even when true, auto-skips if gh / remote is absent.
  # tasks.yaml is always the SSOT; Issues are a projection that is never read back (preserving deterministic, offline operation).
  enabled: false
  label: agentloop        # the label identifying mirror issues (only issues with this label are managed)
  close_on_done: true     # close the issue for tasks with status==done
  repo: ""                # empty: gh infers from origin. Specify owner/repo to fix it explicitly
