# .agentloop/config.yaml — the "single source of knobs" for deterministic orchestration
#
# scripts/agentloop/build_loop.py (the implementation-loop orchestrator) and
# scripts/agentloop/gate_guard.py (the gate mechanism hook) read this file. The behavior of
# parallelism, retry, worktree, and gate enforcement is all decided here. Because code (not a
# natural-language prompt) reads it, changing this deterministically changes the execution control flow.

build:
  # How many independent leaf tasks within the frontier to launch concurrently (the worktree-isolation cap).
  max_parallel: 3

  worktree:
    enabled: true            # set false to run serially on the work branch without isolation
    dir: .worktrees          # the directory to create worktrees in (already .gitignore'd)
    branch_pattern: "{branch}/{task_id}"  # e.g. build/myproduct/T-003

  # The quality gate = **the single definition of the DoD** (CLAUDE.md and /build refer to this list).
  # build_loop.py runs the steps in order per task:
  #   kind: cmd   — run the command; pass/fail is decided deterministically by exit code.
  #                 `retries` is that step's own budget for sending a failure back to the
  #                 implementer; when it runs out the task becomes blocked (escalated to the human).
  #                 An empty `run` skips the step. `run` is shlex-split (quoted arguments work);
  #                 there is no shell, so wrap pipes/redirects in a make target or script.
  #   kind: agent — a headless `claude -p` review+simplify pass that fixes findings in place.
  #                 If it changes code, the cmd steps that already passed are re-run (re-verified).
  # If copied into a project without make, substitute the commands with that project's own.
  quality_gate:
    agent_steps: true        # false = skip agent steps (cmd-only gate; cheaper but below the documented DoD)
    steps:
      - name: test
        kind: cmd
        run: "make test"
        retries: 2
      - name: check
        kind: cmd
        run: "make check"
        retries: 2
      - name: review         # /code-review + /simplify discipline, applied in place
        kind: agent
      - name: smoke          # minimal real-launch smoke test. **Required for runnable deliverables**
        kind: cmd            # (CLI/server: it actually launches and the main commands work).
        run: ""              # empty = skipped. For a runnable product fill in a real launch check as
        retries: 1           # soon as any entry point exists — e.g. "uv run python -m yourapp --help"
                             # (add a make target if you prefer). Tests can be green while the launch
                             # path is broken; an empty run is flagged at gate ④ (/build).

  # Hard timeouts for the external processes the loop runs, in seconds (0 = no timeout).
  # A hung `claude -p` or test run would otherwise stall the autonomous loop forever; on expiry the
  # process is killed and the step fails like a normal red step (retry budget / escalation).
  timeouts:
    cmd_sec: 1800            # quality-gate cmd steps (make test / make check / smoke)
    agent_sec: 3600          # headless claude -p launches (implementer, review agent step)

  # (merge order is deliberately NOT a knob: leaf branches always merge into work deterministically
  #  in ascending task-id order — build_loop.py hardcodes it so every run joins the same way.)

gates:
  # If true, scripts/agentloop/gate_guard.py (the PreToolUse hook) mechanically blocks
  # deliverable edits while the prerequisite gate is unapproved. Set false to fall back to the convention layer (CLAUDE.md) only.
  enforce_hook: true
  # true while this repo IS the template itself: scaffold originals (docs/20-design.md, docs/tasks/**,
  # scripts/**) share paths with product deliverables, so the guard would block its own maintenance.
  # `make init` flips this to false when you turn the template into a product (guard goes live).
  template_mode: true
  # Which paths the guard watches, and the gate each requires. A key ending in "/" guards the whole
  # prefix; any other key guards that exact file. Exact wins over prefixes; longest prefix wins.
  # Omit this key to use these same built-in defaults. In an existing (brownfield) repo, scope this
  # to the docs deliverables first and add your own code paths (e.g. "src/": tasks) when ready.
  guard_paths:
    docs/20-design.md: requirements
    docs/decisions/: requirements
    docs/tasks/: design
    docs/test/: build
    backend/: tasks
    frontend/: tasks
    scripts/: tasks        # product scripts (scripts/agentloop/ is always allowed)

github:
  # One-way-mirror tasks.yaml to GitHub Issues (human-facing visibility). Read by scripts/agentloop/issue_sync.py.
  # **Off by default** = offline-safe. Even when true, auto-skips if gh / remote is absent.
  # tasks.yaml is always the SSOT; Issues are a projection that is never read back (preserving deterministic, offline operation).
  enabled: false
  label: agentloop        # the label identifying mirror issues (only issues with this label are managed)
  close_on_done: true     # close the issue for tasks with status==done
  repo: ""                # empty: gh infers from origin. Specify owner/repo to fix it explicitly
