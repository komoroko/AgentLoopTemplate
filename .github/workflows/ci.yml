name: CI

# Run the same quality gate as local development: pre-commit (commit + pre-push
# hooks = ruff / gitleaks / ruff-format / mypy, via `make check`) plus the test suites.
on:
  # `develop` is a template default for users who adopt a main + develop (Git Flow) model;
  # harmless when the repo only uses main. `pull_request` is unfiltered, so PRs into any base
  # branch (including a future develop) already run CI.
  push:
    branches: [main, develop]
  pull_request:

jobs:
  pre-commit:
    name: pre-commit (lint / format / type-check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync

      - name: Cache pre-commit environments
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}

      # `make check` == pre-commit (commit stage) + pre-push stage + template-lint (the drift
      # canaries across the hand-maintained template files) — the full gate.
      # Frontend hooks (eslint/prettier/tsc) are file-scoped to frontend/ and skip when absent.
      - name: Run pre-commit and template-lint
        run: make check

  test:
    name: tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync

      - name: Run template-tool tests
        run: make test-tools

      - name: Validate the task DAG and the R-N trace
        # --validate: structural consistency of tasks.yaml (vocabulary, unknown ids, cycles).
        # --trace: the requirements → design → tasks thread — only once tasks exist (the empty
        # scaffold's example R-N headings have no tasks yet, by design). Exit 2 = "cannot
        # check" (requirements doc absent) is tolerated; a broken thread exits 1 and fails.
        run: |
          uv run --no-project --with pyyaml python scripts/agentloop/dag.py --validate
          if grep -q "id:" .agentloop/tasks.yaml; then
            uv run --no-project --with pyyaml python scripts/agentloop/dag.py --trace || test $? -eq 2
          else
            echo "tasks.yaml holds no tasks yet: skipping --trace"
          fi

      - name: Run product (backend) tests
        # The bare template ships no backend tests yet, so pytest exits 5 ("no tests collected"),
        # which we tolerate (real failures exit 1 and still fail). Called directly rather than via
        # `make test` because make collapses a recipe's exit code to 2, hiding the 5.
        run: uv run pytest backend/ || test $? -eq 5
