name: CI

# Run the same quality gate as local development: pre-commit (commit + pre-push
# hooks = ruff / gitleaks / ruff-format / mypy, via `make check`) plus the test suites.
on:
  # `develop` is a template default for users who adopt a main + develop (Git Flow) model;
  # harmless when the repo only uses main. `pull_request` is unfiltered, so PRs into any base
  # branch (including a future develop) already run CI.
  push:
    branches: [main, develop]
  pull_request:

jobs:
  pre-commit:
    name: pre-commit (lint / format / type-check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Cache pre-commit environments
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}

      # `make check` == pre-commit (commit stage) + pre-push stage + template-lint (the drift
      # canaries) + sync-check (materialized artifacts match the packaged payload) — the full gate.
      - name: Run pre-commit, template-lint and sync-check
        run: make check

  test:
    name: tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # The endpoints that matter: the advertised 3.10 floor (pyproject requires-python —
        # mypy targets it, but only running the suite proves the runtime) and the newest CPython.
        python-version: ["3.10", "3.13"]
    env:
      UV_PYTHON: ${{ matrix.python-version }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Run the package test suite
        run: uv run --frozen pytest -vv tests/

      - name: Validate the task DAG and the R-N trace
        # --validate: structural consistency of tasks.yaml (vocabulary, unknown ids, cycles).
        # --trace: the requirements → design → tasks thread — only once tasks exist (the empty
        # scaffold's example R-N headings have no tasks yet, by design). Exit 2 = "cannot
        # check" (requirements doc absent) is tolerated; a broken thread exits 1 and fails.
        run: |
          uv run --frozen agentloop dag --validate
          if grep -q "id:" .agentloop/tasks.yaml; then
            uv run --frozen agentloop dag --trace || test $? -eq 2
          else
            echo "tasks.yaml holds no tasks yet: skipping --trace"
          fi

      - name: End-to-end smoke (init → guard deny in a fresh temp repo)
        # Prove the packaged payload seeds a repo and the gate guard denies a pending-gate
        # write — the product-facing path, exercised straight from this checkout via uvx.
        run: |
          d="$(mktemp -d)"; ( cd "$d" && git init -q )
          uvx --from . agentloop init --name smoke --repo "$d"
          test -f "$d/.agentloop/agentloop.lock"
          test ! -e "$d/.claude"   # agent surfaces are opt-in
          printf '{"cwd":"%s","tool_input":{"file_path":"%s/docs/20-design.md"}}' "$d" "$d" \
            | uvx --from . agentloop guard | grep -q '"deny"'
          uvx --from . agentloop sync --check --repo "$d"

  # Aggregate gate over the python matrix. Branch protection requires the single stable name
  # "tests" — the matrix jobs are named per version, so this is what reports it. `if: always()`
  # + the explicit result check make a failed/cancelled matrix FAIL here (a plain `needs` job
  # would be skipped, and a skipped required check slips through protection as passing).
  tests:
    name: tests
    needs: test
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Every matrix job succeeded
        run: test "${{ needs.test.result }}" = "success"
