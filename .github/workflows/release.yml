name: release

# Cut a GitHub Release from the current pyproject version. Human-initiated: someone runs this
# from the Actions tab (workflow_dispatch) once the release-prep commit has merged to main. That
# commit carries three things, and the job below refuses to release without them:
#
#   1. the `version` bump in pyproject.toml (the single version source)
#   2. the matching `## [x.y.z]` section in CHANGELOG.md (and its src/agentloop/data/ copy)
#   3. `agentloop sync` run in this repo, so .agentloop/agentloop.lock records the version being
#      released — this repo dogfoods its own harness, and the lock is the installed instance's
#      record of which agentloop wrote its artifacts. Nothing else re-runs sync, so without this
#      step the lock keeps naming an older release and every CLI invocation here warns about the
#      skew (lock.startup_warning runs on all of them).
#
# The job derives the tag `v<version>` from pyproject (the single version source),
# creates it, and publishes a notes-only Release whose body is the matching CHANGELOG section
# plus a generated install footer (pinned `uv tool install` + upgrade one-liner).
# Distribution stays git-tag + `uv tool install git+<repo>@vX.Y.Z`, so no build artifacts are
# attached. Cutting a release is outward-facing — the Run button is the human's deliberate act.
on:
  workflow_dispatch:

permissions:
  contents: write # create/push the tag and the Release (workflows default to read-only)

jobs:
  release:
    name: cut GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need the full tag list to detect an already-released version

      - name: Derive version and tag from pyproject
        run: |
          version="$(grep -m1 '^version = ' pyproject.toml | sed 's/^version = "\(.*\)"/\1/')"
          if [ -z "$version" ]; then
            echo "could not read [project] version from pyproject.toml" >&2
            exit 1
          fi
          echo "VERSION=$version" >> "$GITHUB_ENV"
          echo "TAG=v$version"    >> "$GITHUB_ENV"
          echo "releasing v$version"

      - name: Guard against re-releasing an existing tag
        run: |
          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "tag $TAG already exists — bump the version in pyproject.toml before releasing" >&2
            exit 1
          fi

      - name: Guard against a stale agentloop.lock
        run: |
          # This repo is itself an installed AgentLoop instance, so its lock names the tool version
          # that wrote .agentloop/. Only `agentloop sync` refreshes it, and a release bump does not
          # run it — catch the omission here rather than shipping a release whose own dogfooded
          # repo claims an older version. Scoped to the `agentloop:` block: `prompts:` has a
          # `version:` key too.
          recorded="$(awk '
            /^agentloop:/       {inblock=1; next}
            inblock && /^[^[:space:]]/ {exit}
            inblock && /^  version:/   {gsub(/['"'"'" ]/, "", $2); print $2; exit}
          ' .agentloop/agentloop.lock)"
          if [ "$recorded" != "$VERSION" ]; then
            echo "agentloop.lock records '${recorded:-(unset)}' but this release is $VERSION." >&2
            echo "Run \`agentloop sync\` in the release-prep commit and merge it before releasing." >&2
            exit 1
          fi
          echo "agentloop.lock is in step with $VERSION"

      - name: Extract release notes from CHANGELOG
        run: |
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" {grab=1; next}
            grab && /^## \[/ {exit}
            grab {print}
          ' CHANGELOG.md > notes.md
          # Trim leading/trailing blank lines; fail loudly if the section is missing/empty.
          if ! grep -q '[^[:space:]]' notes.md; then
            echo "no CHANGELOG section for $VERSION — add one before releasing" >&2
            exit 1
          fi

      - name: Append install instructions
        run: |
          cat >> notes.md <<EOF

          ## Install

          \`\`\`bash
          uv tool install git+${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}@${TAG}
          \`\`\`

          Upgrading to a newer release: re-run the install above with that release's tag and
          \`--force\` (\`uv tool install --force git+${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}@vX.Y.Z\`),
          since \`uv tool upgrade agentloop\` keeps a tag-pinned install on its pinned version. (If
          you installed from the default branch instead, \`uv tool upgrade agentloop\` moves you
          forward.) Then run \`agentloop upgrade\` in each adopted repo to refresh the materialized
          artifacts.
          EOF

      - name: Create and push the tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "$TAG"
          git push origin "$TAG"

      - name: Publish the GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$TAG" --title "$TAG" --notes-file notes.md
