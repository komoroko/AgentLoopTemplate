# .agentloop/plan.yaml — the EXPECTED MODEL: what this cycle is supposed to do, and why we
# believe each part of it. Frozen at gate 3; after that, changing it goes through
# `agentloop revise --to tasks`, which invalidates the downstream gates in a chain.
#
# The one rule that shapes everything else: a statement with no evidence is `unknown` or
# `conflicted`, never grounded prose. If a search found nothing, that is `no_match` — which is
# NOT the same as "no documentation exists", and the difference is why both fields exist.
#
# Sections are filled phase by phase:
#   /req     → claims, evidence_obligations, searches, sources
#   /design  → technical_facts, solutions, oracle drafts
#   /tasks   → oracles (complete, with negative controls), tasks
#
# `agentloop doctor` explains what is still missing for the next gate.

cycle:
  id: cycle-1
  # The commit this cycle branches from. CI re-derives it from the pull-request event and
  # refuses to take this field's word for it (plan §17.3) — it is here for humans and for
  # offline runs.
  base_commit: "0000000"
  branch: build/product

# What must be true before a claim may be treated as settled. Generated by the Policy Engine
# from each claim's decision class, domain, external dependency, public surface, persistence,
# and side effects — not from risk alone.
evidence_obligations: []

# Every search that was actually run, and what each provider answered. `execution_status`
# records whether the search ran; `coverage_status` whether it settled the obligation. A
# provider that could not be reached is `unavailable` and stays visible even when an
# alternate evidence path succeeded.
searches: []

# The evidence itself. `authority.class` is DERIVED by the Policy Engine — existing code and
# README text are `descriptive`, which never grounds a high/critical claim on its own.
sources: []

# What the implementation is supposed to do. One claim, one checkable statement.
claims: []
#  - id: C-001
#    requirement_ids: [R-1]
#    statement: <one behaviour, stated so that it could be false>
#    kind: invariant                  # invariant | behavior | constraint | prohibition
#    decision_class: business_policy  # business_policy | technical_fact | implementation_choice
#    risk: high                       # low | medium | high | critical
#    domains: [<domain>]
#    evidence_obligation_ids: [EO-001]
#    evidence:
#      - { source_id: SRC-001, relation: supports }
#    epistemic_status: grounded       # grounded | unknown | conflicted
#    oracle_ids: [O-001]
#    safe_default:
#      statement: <what happens when we are wrong>
#      source_id: SRC-002

# How something actually works. A human decision cannot make one of these true — that is the
# whole distinction between this section and `claims` (plan §8.5).
technical_facts: []

# The design decisions, their alternatives, and how to undo them.
solutions: []

# Acceptance oracles: a judgement boundary SEPARATE from the implementer's own unit tests,
# frozen at gate 3 along with its harness, runner, and negative controls. A high/critical
# oracle that does not fail on a known-violating subject cannot be frozen — an oracle that
# always passes proves nothing.
oracles: []

# The task DAG. `kind` drives orchestration: layers, parallelism, and merge order derive from
# `blocked_by`, in code rather than by agent discretion.
tasks: []
#  - id: T-001
#    title: <what this task delivers>
#    kind: foundation                 # foundation | parallel | integration
#    blocked_by: []
#    claim_ids: [C-001]
#    oracle_ids: [O-001]
#    domains: [<domain>]
#    risk: high
#    scope:
#      include: [src/]
#      exclude: [.agentloop/oracles/]

# What this cycle deliberately does NOT do. Writing them down is what keeps scope creep
# visible when an agent proposes speculative generality no requirement asked for.
non_goals: []
