# yaml-language-server: $schema=schema/config.schema.json
# .agentloop/config.yaml — the "single source of knobs" for deterministic orchestration
#
# scripts/agentloop/build_loop.py (the implementation-loop orchestrator) and
# scripts/agentloop/gate_guard.py (the gate mechanism hook) read this file. The behavior of
# parallelism, retry, worktree, and gate enforcement is all decided here. Because code (not a
# natural-language prompt) reads it, changing this deterministically changes the execution control flow.

schema_version: 1

build:
  # How many independent leaf tasks within the frontier to launch concurrently (the worktree-isolation cap).
  max_parallel: 3

  # The headless agent CLI mode A launches (implementer / review step / integration fixer /
  # post-build security review). The prompt is appended as the last argument — switch it with
  # `./agentloop agent <claude|codex|gemini|"custom cmd">` (scripts/agentloop/agent_cli.py):
  #   claude:  ["claude", "-p"]
  #   codex:   ["codex", "exec"]
  #   gemini:  ["gemini", "-p"]
  # (Deliberately no per-agent adapter layer — YAGNI: every known CLI takes the prompt as the
  #  last argument. If one ever cannot, extend _parse_headless in build_loop.py, e.g. with a
  #  "{prompt}" placeholder, at that point.)
  headless:
    cmd: ["claude", "-p"]

  worktree:
    enabled: true            # set false to run serially on the work branch without isolation
    dir: .worktrees          # the directory to create worktrees in (already .gitignore'd)
    # Leaf branch name, e.g. build/myproduct-T-003. Joined with `-`, NOT `/`: git forbids a branch
    # that is a path-prefix of another ref, so "{branch}/{task_id}" would always fail to create
    # (refs/heads/build/myproduct already exists as a file and cannot become a directory).
    branch_pattern: "{branch}-{task_id}"

  # The quality gate = **the single definition of the DoD** (AGENTS.md and /build refer to this list).
  # Per task, a `test` command in tasks.yaml that differs from every cmd step below is prepended
  # as a focused `task-test` step (the ticket's own green decision runs first, with the test
  # step's retries budget); a shared default like "make test" adds no extra step.
  # build_loop.py runs the steps in order per task:
  #   kind: cmd   — run the command; pass/fail is decided deterministically by exit code.
  #                 `retries` is that step's own budget for sending a failure back to the
  #                 implementer; when it runs out the task becomes blocked (escalated to the human).
  #                 An empty `run` skips the step. `run` is shlex-split (quoted arguments work);
  #                 there is no shell, so wrap pipes/redirects in a make target or script.
  #   kind: agent — a headless review+simplify pass (launched via headless.cmd above) that fixes
  #     findings in place (mode A; in interactive mode B the lead applies the same review disciplines itself).
  #                 If it changes code, the cmd steps that already passed are re-run (re-verified).
  # If copied into a project without make, substitute the commands with that project's own.
  quality_gate:
    agent_steps: true        # false = skip agent steps (cmd-only gate; cheaper but below the documented DoD)
    # After a parallel batch merges 2+ leaves into work, re-run the cmd steps once on the MERGED
    # state: each leaf was verified only in its isolated worktree, and the combined file set can
    # still be red (a lint/format/type error only the whole tree surfaces). A red is sent to a
    # headless fixer within each step's retries budget; over budget the batch's tasks block.
    # A single-leaf join is skipped — its merged tree is identical to the already-verified worktree.
    integration_gate: true
    steps:
      - name: test
        kind: cmd
        run: "make test"
        retries: 2
      - name: check
        kind: cmd
        run: "make check"
        retries: 2
      - name: review         # /code-review + /simplify discipline, applied in place
        kind: agent
      - name: smoke          # minimal real-launch smoke test. **Required for runnable deliverables**
        kind: cmd            # (CLI/server: it actually launches and the main commands work).
        run: ""              # empty = skipped. For a runnable product fill in a real launch check as
        retries: 1           # soon as any entry point exists — e.g. "uv run python -m yourapp --help"
                             # (add a make target if you prefer). Tests can be green while the launch
                             # path is broken; an empty run is flagged at gate ④ (/build).
        required: false      # the human decision knob (at /design or /tasks): set true once the
                             # deliverable is runnable — then an empty `run` refuses to build
                             # (fail-fast) instead of silently skipping the launch check.

  # Steps run once when every task is done, before presenting gate ④.
  post_build:
    # Launch a headless security review of the work branch's changes and write the report to
    # .agentloop/security-review.md with the reviewed HEAD hash embedded (re-runs at the same
    # HEAD skip, so a re-invoked loop never pays twice; the run is recorded as a security_review
    # event). Report-only: findings are triaged by the human/lead and fixed via the implementer,
    # and /verify still runs its own full /security-review + make audit later.
    # Cost: one headless.cmd launch per completed build (mode A). false = run the security
    # review yourself before gate ④ (Claude Code: /security-review; other agents: an equivalent pass).
    security_review: true

  # Hard timeouts for the external processes the loop runs, in seconds (0 = no timeout).
  # A hung headless launch or test run would otherwise stall the autonomous loop forever; on expiry
  # the process is killed and the step fails like a normal red step (retry budget / escalation).
  timeouts:
    cmd_sec: 1800            # quality-gate cmd steps (make test / make check / smoke)
    agent_sec: 3600          # headless.cmd launches (implementer, review agent step)

  # (merge order is deliberately NOT a knob: leaf branches always merge into work deterministically
  #  in ascending task-id order — build_loop.py hardcodes it so every run joins the same way.)

gates:
  # If true, scripts/agentloop/gate_guard.py (the PreToolUse hook) mechanically blocks
  # deliverable edits while the prerequisite gate is unapproved. Set false to fall back to the convention layer (AGENTS.md) only.
  enforce_hook: true
  # true while this repo IS the template itself: scaffold originals (docs/20-design.md, docs/tasks/**,
  # scripts/**) share paths with product deliverables, so the guard would block its own maintenance.
  # `make init` flips this to false when you turn the template into a product (guard goes live).
  template_mode: true
  # Which paths the guard watches, and the gate each requires. A key ending in "/" guards the whole
  # prefix; any other key guards that exact file. Exact wins over prefixes; longest prefix wins.
  # Omit this key to use these same built-in defaults. In an existing (brownfield) repo, scope this
  # to the docs deliverables first and add your own code paths (e.g. "src/": tasks) when ready.
  # tests/ is deliberately NOT guarded: fixture/harness prep while a gate is pending is sanctioned
  # speculative work (AGENTS.md "Minimizing the approval-wait bottleneck").
  guard_paths:
    docs/20-design.md: requirements
    docs/decisions/: requirements
    docs/tasks/: design
    docs/test/: build
    src/: tasks
    lib/: tasks
    app/: tasks
    backend/: tasks
    frontend/: tasks
    scripts/: tasks        # product scripts (scripts/agentloop/ is always allowed)

github:
  # One-way-mirror tasks.yaml to GitHub Issues (human-facing visibility). Read by scripts/agentloop/issue_sync.py.
  # **Off by default** = offline-safe. Even when true, auto-skips if gh / remote is absent.
  # tasks.yaml is always the SSOT; Issues are a projection that is never read back (preserving deterministic, offline operation).
  enabled: false
  label: agentloop        # the label identifying mirror issues (only issues with this label are managed)
  close_on_done: true     # close the issue for tasks with status==done
  repo: ""                # empty: gh infers from origin. Specify owner/repo to fix it explicitly
