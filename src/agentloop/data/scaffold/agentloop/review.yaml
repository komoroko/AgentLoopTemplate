# .agentloop/review.yaml — the post-build review, in two independently-digested halves.
#
# `machine` is generated by `agentloop review generate`; `human` is filled by the review UI.
# The split is load-bearing:
#   - regenerating `machine` RESETS `human` (the answers were about different code)
#   - answering a question in `human` does NOT make `machine` stale
#
# Both are machine-written. Editing either by hand invalidates the digests a gate receipt and
# a human signature bind, which `doctor` reports rather than silently accepting.
#
# What you will not find anywhere in this file: a single `verified` field. Integrity (are the
# bytes what they claim to be), semantic support (does the evidence actually mean this, and
# who says so), and conformance (did the frozen oracle pass) are three different questions,
# and collapsing them is what let an AI's opinion read as a check.

machine:
  status: not_generated   # not_generated | generated
  binding: {}          # what this review is a review OF; any digest moving makes it stale
  summary: {}
  statements: []       # every human-facing sentence, with its epistemic status and evidence
  actual_extraction: []  # what the code DOES, extracted without ever seeing the plan
  coverage: []         # what could and could not be analysed — an empty list is not "clean"
  claims: []           # per-claim: integrity / semantic_support / conformance, separately
  gaps: []
  extra_behaviors: []  # behaviour no claim accounts for
  security: { findings: [] }
  module_deltas: []
  scenarios: []
  decision_cards: []
  challenges: []       # asked BEFORE any expected/actual reveal
  evidence_matrix: []
  review_budget: []

human:
  status: not_started  # not_started | in_progress | frozen | attested
